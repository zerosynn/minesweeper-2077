<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MINE//SWEEP 2077</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=VT323&display=swap" rel="stylesheet">
<style>
  :root {
    --neon-pink: #ff2d78;
    --neon-cyan: #00f5ff;
    --neon-purple: #bf00ff;
    --neon-yellow: #ffe600;
    --dark-bg: #050510;
    --grid-bg: #0a0a1a;
    --cell-bg: #0d0d2b;
    --cell-revealed: #060614;
    --cell-border: #1a1a3e;
    --glow-pink: 0 0 8px #ff2d78, 0 0 20px #ff2d7855;
    --glow-cyan: 0 0 8px #00f5ff, 0 0 20px #00f5ff55;
    --glow-purple: 0 0 8px #bf00ff, 0 0 20px #bf00ff55;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--dark-bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Share Tech Mono', monospace;
    overflow: hidden;
    position: relative;
  }

  /* Scanlines */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,245,255,0.02) 2px,
      rgba(0,245,255,0.02) 4px
    );
    pointer-events: none;
    z-index: 1000;
  }

  /* Grid background */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,245,255,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,245,255,0.05) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* Vaporwave gradient horizon */
  .horizon {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 40vh;
    background: linear-gradient(to top,
      rgba(191,0,255,0.15) 0%,
      rgba(255,45,120,0.08) 30%,
      transparent 100%
    );
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    padding: 20px;
  }

  /* Title */
  .title-block {
    text-align: center;
    position: relative;
  }

  .title-main {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(28px, 5vw, 52px);
    font-weight: 900;
    color: var(--neon-cyan);
    text-shadow: var(--glow-cyan);
    letter-spacing: 6px;
    line-height: 1;
  }

  .title-sub {
    font-family: 'VT323', monospace;
    font-size: 18px;
    color: var(--neon-pink);
    text-shadow: var(--glow-pink);
    letter-spacing: 8px;
    margin-top: 4px;
  }

  .title-line {
    width: 100%;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--neon-purple), var(--neon-cyan), var(--neon-purple), transparent);
    margin-top: 8px;
    box-shadow: 0 0 8px var(--neon-purple);
  }

  /* HUD */
  .hud {
    display: flex;
    align-items: center;
    gap: 20px;
    width: 100%;
    justify-content: space-between;
    flex-wrap: wrap;
  }

  .hud-panel {
    background: rgba(0,245,255,0.05);
    border: 1px solid var(--neon-cyan);
    box-shadow: var(--glow-cyan), inset 0 0 20px rgba(0,245,255,0.05);
    padding: 8px 16px;
    min-width: 110px;
    text-align: center;
    position: relative;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
  }

  .hud-label {
    font-family: 'VT323', monospace;
    font-size: 13px;
    color: var(--neon-cyan);
    opacity: 0.7;
    letter-spacing: 3px;
  }

  .hud-value {
    font-family: 'Orbitron', sans-serif;
    font-size: 24px;
    font-weight: 700;
    color: var(--neon-yellow);
    text-shadow: 0 0 10px var(--neon-yellow);
  }

  /* Difficulty selector */
  .difficulty {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .diff-btn {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    letter-spacing: 2px;
    padding: 6px 14px;
    border: 1px solid var(--neon-purple);
    background: transparent;
    color: var(--neon-purple);
    cursor: pointer;
    transition: all 0.2s;
    clip-path: polygon(6px 0%, 100% 0%, calc(100% - 6px) 100%, 0% 100%);
    text-transform: uppercase;
  }

  .diff-btn:hover, .diff-btn.active {
    background: var(--neon-purple);
    color: #000;
    box-shadow: var(--glow-purple);
    text-shadow: none;
  }

  .reset-btn {
    font-family: 'Orbitron', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 3px;
    padding: 8px 20px;
    border: 2px solid var(--neon-pink);
    background: transparent;
    color: var(--neon-pink);
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
  }

  .reset-btn:hover {
    background: var(--neon-pink);
    color: #000;
    box-shadow: var(--glow-pink);
  }

  /* Board */
  .board-container {
    position: relative;
  }

  .board-frame {
    padding: 3px;
    background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple), var(--neon-pink));
    box-shadow:
      0 0 20px rgba(0,245,255,0.4),
      0 0 40px rgba(191,0,255,0.2),
      inset 0 0 20px rgba(0,0,0,0.8);
  }

  .board {
    display: grid;
    gap: 2px;
    background: #000;
    padding: 2px;
    user-select: none;
  }

  /* Cell */
  .cell {
    width: 36px;
    height: 36px;
    background: var(--cell-bg);
    border: 1px solid var(--cell-border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Orbitron', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.1s, transform 0.05s;
    position: relative;
    overflow: hidden;
  }

  .cell::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, transparent 50%);
    pointer-events: none;
  }

  .cell:hover:not(.revealed):not(.exploded) {
    background: rgba(0,245,255,0.1);
    border-color: var(--neon-cyan);
    box-shadow: inset 0 0 10px rgba(0,245,255,0.2);
    transform: scale(1.05);
    z-index: 2;
  }

  .cell.revealed {
    background: var(--cell-revealed);
    border-color: rgba(0,245,255,0.1);
    cursor: default;
  }

  .cell.flagged {
    background: rgba(255,45,120,0.1);
    border-color: var(--neon-pink);
    box-shadow: inset 0 0 10px rgba(255,45,120,0.2);
  }

  .cell.flagged::after {
    content: '⚑';
    font-size: 16px;
    color: var(--neon-pink);
    text-shadow: var(--glow-pink);
  }

  .cell.question {
    background: rgba(255,230,0,0.08);
    border-color: var(--neon-yellow);
    box-shadow: inset 0 0 10px rgba(255,230,0,0.15);
  }

  .cell.question::after {
    content: '?';
    font-family: 'Orbitron', sans-serif;
    font-size: 15px;
    font-weight: 900;
    color: var(--neon-yellow);
    text-shadow: 0 0 8px var(--neon-yellow), 0 0 20px var(--neon-yellow);
  }

  /* Chord (both-click) highlight */
  .cell.chord-highlight {
    background: rgba(0,245,255,0.18) !important;
    border-color: var(--neon-cyan) !important;
    box-shadow: inset 0 0 14px rgba(0,245,255,0.35), 0 0 8px rgba(0,245,255,0.4) !important;
    transform: scale(1.08);
    z-index: 3;
  }

  .cell.mine-revealed {
    background: rgba(191,0,255,0.15);
    border-color: var(--neon-purple);
  }

  .cell.exploded {
    background: rgba(255,45,120,0.3);
    border-color: var(--neon-pink);
    animation: explode-cell 0.5s ease forwards;
  }

  @keyframes explode-cell {
    0% { background: rgba(255,230,0,0.8); transform: scale(1.2); }
    30% { background: rgba(255,100,0,0.8); }
    100% { background: rgba(255,45,120,0.3); transform: scale(1); }
  }

  /* Number colors */
  .n1 { color: var(--neon-cyan); text-shadow: var(--glow-cyan); }
  .n2 { color: #00ff88; text-shadow: 0 0 8px #00ff88; }
  .n3 { color: var(--neon-pink); text-shadow: var(--glow-pink); }
  .n4 { color: var(--neon-purple); text-shadow: var(--glow-purple); }
  .n5 { color: var(--neon-yellow); text-shadow: 0 0 8px var(--neon-yellow); }
  .n6 { color: #ff6600; text-shadow: 0 0 8px #ff6600; }
  .n7 { color: #ff0066; text-shadow: 0 0 8px #ff0066; }
  .n8 { color: #ffffff; text-shadow: 0 0 8px #ffffff; }

  .mine-icon {
    font-size: 18px;
    filter: drop-shadow(0 0 6px var(--neon-purple));
  }

  /* Reveal animation */
  @keyframes cell-reveal {
    0% { opacity: 0; transform: scale(0.5); }
    60% { transform: scale(1.1); }
    100% { opacity: 1; transform: scale(1); }
  }

  .cell.just-revealed {
    animation: cell-reveal 0.15s ease forwards;
  }

  /* Explosion canvas overlay */
  #explosionCanvas {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 500;
  }

  /* Game Over / Win overlay */
  .overlay {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 600;
    background: rgba(5,5,16,0.85);
    backdrop-filter: blur(4px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s;
  }

  .overlay.visible {
    opacity: 1;
    pointer-events: all;
  }

  .overlay-title {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(40px, 8vw, 80px);
    font-weight: 900;
    letter-spacing: 8px;
    animation: glitch 1s infinite;
  }

  .overlay.win .overlay-title {
    color: var(--neon-cyan);
    text-shadow: var(--glow-cyan), 0 0 40px var(--neon-cyan);
  }

  .overlay.lose .overlay-title {
    color: var(--neon-pink);
    text-shadow: var(--glow-pink), 0 0 40px var(--neon-pink);
  }

  .overlay-sub {
    font-family: 'VT323', monospace;
    font-size: 24px;
    letter-spacing: 6px;
    color: var(--neon-purple);
    text-shadow: var(--glow-purple);
    margin: 12px 0 28px;
  }

  .overlay-btn {
    font-family: 'Orbitron', sans-serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 4px;
    padding: 12px 32px;
    border: 2px solid var(--neon-cyan);
    background: transparent;
    color: var(--neon-cyan);
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
    clip-path: polygon(10px 0%, 100% 0%, calc(100% - 10px) 100%, 0% 100%);
  }

  .overlay-btn:hover {
    background: var(--neon-cyan);
    color: #000;
    box-shadow: var(--glow-cyan);
  }

  @keyframes glitch {
    0%, 90%, 100% { text-shadow: inherit; transform: translateX(0); }
    91% { transform: translateX(-3px); filter: hue-rotate(90deg); }
    93% { transform: translateX(3px); }
    95% { transform: translateX(-2px); filter: hue-rotate(-90deg); }
    97% { transform: translateX(0); filter: none; }
  }

  /* Status bar */
  .status-bar {
    font-family: 'VT323', monospace;
    font-size: 16px;
    color: rgba(0,245,255,0.5);
    letter-spacing: 3px;
    text-align: center;
    min-height: 20px;
  }

  /* Floating particles container */
  #particles {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    overflow: hidden;
  }

  .particle {
    position: absolute;
    width: 2px;
    height: 2px;
    border-radius: 50%;
    animation: float-up linear forwards;
  }

  @keyframes float-up {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-100px) scale(0); }
  }

  /* Responsive */
  @media (max-width: 600px) {
    .cell { width: 28px; height: 28px; font-size: 10px; }
    .mine-icon { font-size: 14px; }
    .hud-value { font-size: 18px; }
  }
</style>
</head>
<body>

<div class="horizon"></div>
<div id="particles"></div>
<canvas id="explosionCanvas"></canvas>

<div class="overlay" id="overlay">
  <div class="overlay-title" id="overlayTitle"></div>
  <div class="overlay-sub" id="overlaySub"></div>
  <button class="overlay-btn" onclick="restartGame()">[ REBOOT ]</button>
</div>

<div class="wrapper">
  <div class="title-block">
    <div class="title-main">MINE//SWEEP</div>
    <div class="title-sub">◈ NEON PROTOCOL 2077 ◈</div>
    <div class="title-line"></div>
  </div>

  <div class="hud">
    <div class="hud-panel">
      <div class="hud-label">⚡ MINES</div>
      <div class="hud-value" id="mineCount">0</div>
    </div>

    <div style="display:flex; flex-direction:column; align-items:center; gap:10px;">
      <div class="difficulty">
        <button class="diff-btn active" onclick="setDiff('easy')">EASY</button>
        <button class="diff-btn" onclick="setDiff('medium')">MED</button>
        <button class="diff-btn" onclick="setDiff('hard')">HARD</button>
      </div>
      <button class="reset-btn" onclick="restartGame()">⟳ REBOOT</button>
    </div>

    <div class="hud-panel">
      <div class="hud-label">⏱ TIME</div>
      <div class="hud-value" id="timer">000</div>
    </div>
  </div>

  <div class="board-container">
    <div class="board-frame">
      <div class="board" id="board"></div>
    </div>
  </div>

  <div class="status-bar" id="statusBar">[ RIGHT CLICK TO FLAG MINES ]</div>
</div>

<script>
const DIFFICULTIES = {
  easy:   { rows: 9,  cols: 9,  mines: 10 },
  medium: { rows: 16, cols: 16, mines: 40 },
  hard:   { rows: 16, cols: 30, mines: 99 },
};

// cellState: 0 = normal, 1 = flagged, 2 = question
const STATE_NORMAL   = 0;
const STATE_FLAGGED  = 1;
const STATE_QUESTION = 2;

let currentDiff = 'easy';
let config = { ...DIFFICULTIES[currentDiff] };
let board = [];
let revealed = [];
let cellState = [];   // replaces old flagged[][]
let minePos = new Set();
let gameState = 'waiting';
let timerInterval = null;
let seconds = 0;
let firstClick = true;

// Chord (both-button) tracking
let mouseDownButtons = 0;   // bitmask: 1=left, 2=right
let chordR = -1, chordC = -1;
let chordNeighbors = [];    // currently highlighted cells

const boardEl = document.getElementById('board');
const mineCountEl = document.getElementById('mineCount');
const timerEl = document.getElementById('timer');
const statusEl = document.getElementById('statusBar');
const overlayEl = document.getElementById('overlay');
const overlayTitle = document.getElementById('overlayTitle');
const overlaySub = document.getElementById('overlaySub');

function setDiff(diff) {
  currentDiff = diff;
  document.querySelectorAll('.diff-btn').forEach(b => {
    b.classList.toggle('active', b.textContent.toLowerCase().startsWith(diff.substring(0,3)));
  });
  restartGame();
}

function restartGame() {
  config = { ...DIFFICULTIES[currentDiff] };
  const { rows, cols, mines } = config;

  board     = Array.from({ length: rows }, () => Array(cols).fill(0));
  revealed  = Array.from({ length: rows }, () => Array(cols).fill(false));
  cellState = Array.from({ length: rows }, () => Array(cols).fill(STATE_NORMAL));
  minePos   = new Set();
  gameState = 'waiting';
  firstClick = true;
  seconds = 0;
  mouseDownButtons = 0;
  chordNeighbors = [];
  clearInterval(timerInterval);
  timerEl.textContent  = '000';
  mineCountEl.textContent = String(mines).padStart(3, '0');
  statusEl.textContent = '[ RIGHT CLICK TO FLAG · BOTH BUTTONS TO SCAN ]';
  overlayEl.className  = 'overlay';

  renderBoard();
}

function placeMines(safeR, safeC) {
  const { rows, cols, mines } = config;
  const safeZone = new Set();
  for (let dr = -1; dr <= 1; dr++)
    for (let dc = -1; dc <= 1; dc++) {
      const r = safeR + dr, c = safeC + dc;
      if (r >= 0 && r < rows && c >= 0 && c < cols)
        safeZone.add(r * cols + c);
    }

  while (minePos.size < mines) {
    const idx = Math.floor(Math.random() * rows * cols);
    if (!safeZone.has(idx)) minePos.add(idx);
  }

  for (const idx of minePos) {
    const r = Math.floor(idx / cols), c = idx % cols;
    board[r][c] = -1;
  }

  for (let r = 0; r < rows; r++)
    for (let c = 0; c < cols; c++) {
      if (board[r][c] === -1) continue;
      let cnt = 0;
      for (let dr = -1; dr <= 1; dr++)
        for (let dc = -1; dc <= 1; dc++) {
          const nr = r + dr, nc = c + dc;
          if (nr >= 0 && nr < rows && nc >= 0 && nc < cols && board[nr][nc] === -1)
            cnt++;
        }
      board[r][c] = cnt;
    }
}

/* ── Cell state class helper ── */
function cellClass(r, c) {
  if (revealed[r][c]) return 'cell revealed';
  const st = cellState[r][c];
  if (st === STATE_FLAGGED)  return 'cell flagged';
  if (st === STATE_QUESTION) return 'cell question';
  return 'cell';
}

function applyCellClass(r, c) {
  const el = getCell(r, c);
  if (el) el.className = cellClass(r, c);
}

/* ── Render ── */
function renderBoard() {
  const { rows, cols } = config;
  boardEl.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
  boardEl.innerHTML = '';

  for (let r = 0; r < rows; r++)
    for (let c = 0; c < cols; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.r = r;
      cell.dataset.c = c;

      // ── Mouse events for chord support ──
      cell.addEventListener('mousedown',  e => onMouseDown(e, r, c));
      cell.addEventListener('mouseup',    e => onMouseUp(e, r, c));
      cell.addEventListener('mouseleave', e => onMouseLeave(e, r, c));
      cell.addEventListener('mouseenter', e => onMouseEnter(e, r, c));
      cell.addEventListener('contextmenu', e => e.preventDefault());

      // ── Touch: long-press = right-click, tap = left-click ──
      cell.addEventListener('touchstart', handleTouchStart, { passive: true });
      cell.addEventListener('touchend',   ev => handleTouchEnd(ev, r, c));

      boardEl.appendChild(cell);
    }
}

/* ══════════════════════════════════════════════════════
   CHORD (BOTH BUTTON) LOGIC
   ══════════════════════════════════════════════════════ */
function neighbors(r, c) {
  const res = [];
  for (let dr = -1; dr <= 1; dr++)
    for (let dc = -1; dc <= 1; dc++) {
      if (dr === 0 && dc === 0) continue;
      const nr = r + dr, nc = c + dc;
      if (nr >= 0 && nr < config.rows && nc >= 0 && nc < config.cols)
        res.push([nr, nc]);
    }
  return res;
}

function highlightNeighbors(r, c) {
  clearChordHighlight();
  if (!revealed[r][c]) return;
  chordR = r; chordC = c;
  chordNeighbors = neighbors(r, c).filter(([nr, nc]) => !revealed[nr][nc] && cellState[nr][nc] !== STATE_FLAGGED);
  for (const [nr, nc] of chordNeighbors) {
    const el = getCell(nr, nc);
    if (el) el.classList.add('chord-highlight');
  }
}

function clearChordHighlight() {
  for (const [nr, nc] of chordNeighbors) {
    const el = getCell(nr, nc);
    if (el) el.classList.remove('chord-highlight');
  }
  chordNeighbors = [];
  chordR = -1; chordC = -1;
}

function chordReveal(r, c) {
  if (!revealed[r][c]) return;
  const val = board[r][c];
  if (val <= 0) return;

  // Count adjacent flags
  const nbrs = neighbors(r, c);
  const flagCount = nbrs.filter(([nr, nc]) => cellState[nr][nc] === STATE_FLAGGED).length;

  if (flagCount !== val) return; // not enough flags — just peek, don't open

  // Flag count matches: open all non-flagged neighbors
  for (const [nr, nc] of nbrs) {
    if (!revealed[nr][nc] && cellState[nr][nc] !== STATE_FLAGGED) {
      if (board[nr][nc] === -1) {
        triggerExplosion(nr, nc);
        return;
      }
      reveal(nr, nc);
    }
  }
  checkWin();
}

/* ── Mouse handlers ── */
function onMouseDown(e, r, c) {
  if (gameState === 'won' || gameState === 'lost') return;
  mouseDownButtons |= (1 << e.button); // button 0=left, 2=right

  if (e.button === 2 && !(mouseDownButtons & 1)) {
    // Pure right-click down: will handle on up
    return;
  }

  // Both buttons held on a revealed cell → show chord preview
  const bothHeld = (mouseDownButtons & 1) && (mouseDownButtons & 4);
  if (bothHeld && revealed[r][c]) {
    highlightNeighbors(r, c);
  }
}

function onMouseUp(e, r, c) {
  if (gameState === 'won' || gameState === 'lost') {
    mouseDownButtons = 0;
    return;
  }

  const wasLeft  = (mouseDownButtons & 1)  !== 0;
  const wasRight = (mouseDownButtons & 4)  !== 0;
  mouseDownButtons &= ~(1 << e.button);

  // Both-button chord release
  if (wasLeft && wasRight) {
    clearChordHighlight();
    if (revealed[r][c]) chordReveal(r, c);
    mouseDownButtons = 0;
    return;
  }

  // Single left click
  if (e.button === 0 && wasLeft && !wasRight) {
    handleClick(r, c);
  }

  // Single right click
  if (e.button === 2 && wasRight && !wasLeft) {
    handleFlag(r, c);
  }
}

function onMouseLeave(e, r, c) {
  // If chord in progress and moving away, track new cell
  const bothHeld = (mouseDownButtons & 1) && (mouseDownButtons & 4);
  if (!bothHeld) clearChordHighlight();
}

function onMouseEnter(e, r, c) {
  const bothHeld = (mouseDownButtons & 1) && (mouseDownButtons & 4);
  if (bothHeld && revealed[r][c]) highlightNeighbors(r, c);
  else if (bothHeld) clearChordHighlight();
}

/* ── Touch handling ── */
let touchTimer = null;
function handleTouchStart(e) {
  touchTimer = setTimeout(() => { touchTimer = null; }, 400);
}
function handleTouchEnd(ev, r, c) {
  if (touchTimer !== null) {
    clearTimeout(touchTimer);
    touchTimer = null;
    handleClick(r, c);
  } else {
    ev.preventDefault();
    handleFlag(r, c);
  }
}

/* ── Helpers ── */
function getCell(r, c) {
  return boardEl.querySelector(`[data-r="${r}"][data-c="${c}"]`);
}

/* ── Click / Flag ── */
function handleClick(r, c) {
  if (gameState === 'won' || gameState === 'lost') return;
  if (cellState[r][c] === STATE_FLAGGED || revealed[r][c]) return;

  if (firstClick) {
    firstClick = false;
    placeMines(r, c);
    gameState = 'playing';
    timerInterval = setInterval(() => {
      seconds++;
      timerEl.textContent = String(Math.min(seconds, 999)).padStart(3, '0');
    }, 1000);
  }

  if (board[r][c] === -1) {
    triggerExplosion(r, c);
    return;
  }

  reveal(r, c);
  checkWin();
}

function handleFlag(r, c) {
  if (gameState === 'won' || gameState === 'lost') return;
  if (revealed[r][c]) return;
  if (gameState === 'waiting') return; // no flagging before first click

  // Cycle: normal → flagged → question → normal
  const cur = cellState[r][c];
  const next = (cur + 1) % 3;
  cellState[r][c] = next;

  const cell = getCell(r, c);
  cell.className = cellClass(r, c);

  // Update mine counter (only flags count)
  const flaggedCount = cellState.flat().filter(s => s === STATE_FLAGGED).length;
  const remaining = config.mines - flaggedCount;
  mineCountEl.textContent = String(remaining).padStart(3, '0');

  if (next === STATE_FLAGGED) spawnFlagParticle(cell);
}

/* ── Reveal ── */
function reveal(r, c) {
  if (r < 0 || r >= config.rows || c < 0 || c >= config.cols) return;
  if (revealed[r][c] || cellState[r][c] === STATE_FLAGGED) return;
  revealed[r][c] = true;

  const cell = getCell(r, c);
  cell.className = 'cell revealed just-revealed';
  setTimeout(() => cell.classList.remove('just-revealed'), 200);

  const val = board[r][c];
  if (val > 0) {
    cell.innerHTML = `<span class="n${val}">${val}</span>`;
  } else if (val === 0) {
    for (let dr = -1; dr <= 1; dr++)
      for (let dc = -1; dc <= 1; dc++)
        if (dr !== 0 || dc !== 0)
          setTimeout(() => reveal(r + dr, c + dc), 15);
  }
}

/* ── Explosion ── */
function triggerExplosion(r, c) {
  gameState = 'lost';
  clearInterval(timerInterval);

  const cell = getCell(r, c);
  cell.className = 'cell exploded';
  cell.innerHTML = '<span class="mine-icon">💥</span>';

  const rect = cell.getBoundingClientRect();
  launchExplosionFX(rect.left + rect.width / 2, rect.top + rect.height / 2, true);

  setTimeout(() => {
    let delay = 0;
    for (const idx of minePos) {
      const mr = Math.floor(idx / config.cols), mc = idx % config.cols;
      if (mr === r && mc === c) continue;
      setTimeout(() => {
        const mcell = getCell(mr, mc);
        if (cellState[mr][mc] !== STATE_FLAGGED) {
          mcell.className = 'cell mine-revealed';
          mcell.innerHTML = '<span class="mine-icon">💣</span>';
          const mrect = mcell.getBoundingClientRect();
          launchExplosionFX(mrect.left + mrect.width / 2, mrect.top + mrect.height / 2, false);
        }
      }, delay += 60);
    }
    setTimeout(() => {
      overlayTitle.textContent = 'SYSTEM BREACH';
      overlaySub.textContent = '[ ALL DATA CORRUPTED ]';
      overlayEl.className = 'overlay lose visible';
    }, delay + 400);
  }, 300);
}

/* ── Win check ── */
function checkWin() {
  const { rows, cols, mines } = config;
  let revealedCount = 0;
  for (let r = 0; r < rows; r++)
    for (let c = 0; c < cols; c++)
      if (revealed[r][c]) revealedCount++;

  if (revealedCount === rows * cols - mines) {
    gameState = 'won';
    clearInterval(timerInterval);
    statusEl.textContent = '[ SECTOR CLEARED ]';
    for (let i = 0; i < 40; i++) setTimeout(() => spawnWinParticle(), i * 60);
    setTimeout(() => {
      overlayTitle.textContent = 'ACCESS GRANTED';
      overlaySub.textContent = `[ TIME: ${timerEl.textContent}s — SYSTEM SECURE ]`;
      overlayEl.className = 'overlay win visible';
    }, 800);
  }
}

// ─── EXPLOSION FX ────────────────────────────────────────────────────
const canvas = document.getElementById('explosionCanvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

let particles = [];

function launchExplosionFX(cx, cy, big) {
  const count = big ? 80 : 30;
  const colors = ['#ff2d78', '#ffe600', '#00f5ff', '#bf00ff', '#ff6600', '#ffffff'];

  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = big ? Math.random() * 10 + 3 : Math.random() * 6 + 1;
    const color = colors[Math.floor(Math.random() * colors.length)];
    const size = big ? Math.random() * 5 + 2 : Math.random() * 3 + 1;
    particles.push({
      x: cx, y: cy,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - (big ? 4 : 2),
      color, size,
      life: 1,
      decay: big ? 0.02 + Math.random() * 0.02 : 0.03 + Math.random() * 0.03,
      type: Math.random() > 0.5 ? 'spark' : 'dot',
    });
  }

  if (big) {
    // Shockwave ring
    particles.push({
      x: cx, y: cy, type: 'ring',
      radius: 5, maxRadius: 120,
      color: '#ff2d78', life: 1, decay: 0.03,
    });
    particles.push({
      x: cx, y: cy, type: 'ring',
      radius: 5, maxRadius: 80,
      color: '#00f5ff', life: 1, decay: 0.04,
    });
  }

  if (!animRunning) startAnim();
}

let animRunning = false;
function startAnim() {
  animRunning = true;
  requestAnimationFrame(animLoop);
}

function animLoop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  particles = particles.filter(p => p.life > 0);

  for (const p of particles) {
    if (p.type === 'ring') {
      p.radius += (p.maxRadius - p.radius) * 0.15;
      p.life -= p.decay;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
      ctx.strokeStyle = p.color + Math.floor(p.life * 255).toString(16).padStart(2, '0');
      ctx.lineWidth = 3;
      ctx.shadowBlur = 20;
      ctx.shadowColor = p.color;
      ctx.stroke();
      ctx.shadowBlur = 0;
    } else {
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.25;
      p.vx *= 0.97;
      p.life -= p.decay;

      const alpha = Math.floor(p.life * 255).toString(16).padStart(2, '0');
      ctx.beginPath();

      if (p.type === 'spark') {
        ctx.moveTo(p.x, p.y);
        ctx.lineTo(p.x - p.vx * 3, p.y - p.vy * 3);
        ctx.strokeStyle = p.color + alpha;
        ctx.lineWidth = p.size * 0.5;
        ctx.shadowBlur = 10;
        ctx.shadowColor = p.color;
        ctx.stroke();
      } else {
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fillStyle = p.color + alpha;
        ctx.shadowBlur = 15;
        ctx.shadowColor = p.color;
        ctx.fill();
      }
      ctx.shadowBlur = 0;
    }
  }

  if (particles.length > 0) requestAnimationFrame(animLoop);
  else animRunning = false;
}

// ─── DOM PARTICLES ────────────────────────────────────────────────────
function spawnFlagParticle(cellEl) {
  const rect = cellEl.getBoundingClientRect();
  const colors = ['#ff2d78', '#ffe600'];
  for (let i = 0; i < 5; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.cssText = `
      left: ${rect.left + rect.width / 2}px;
      top: ${rect.top}px;
      background: ${colors[i % 2]};
      box-shadow: 0 0 4px ${colors[i % 2]};
      animation-duration: ${0.4 + Math.random() * 0.4}s;
      transform: translateX(${(Math.random() - 0.5) * 40}px);
    `;
    document.getElementById('particles').appendChild(p);
    setTimeout(() => p.remove(), 800);
  }
}

function spawnWinParticle() {
  const colors = ['#00f5ff', '#bf00ff', '#ff2d78', '#ffe600', '#00ff88'];
  const p = document.createElement('div');
  p.className = 'particle';
  p.style.cssText = `
    width: ${2 + Math.random() * 4}px;
    height: ${2 + Math.random() * 4}px;
    left: ${Math.random() * window.innerWidth}px;
    top: ${window.innerHeight}px;
    background: ${colors[Math.floor(Math.random() * colors.length)]};
    animation-duration: ${1 + Math.random()}s;
    transform: translateX(${(Math.random() - 0.5) * 100}px);
  `;
  document.getElementById('particles').appendChild(p);
  setTimeout(() => p.remove(), 2000);
}

// ─── INIT ─────────────────────────────────────────────────────────────
restartGame();
</script>
